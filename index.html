<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Identidad ── -->
    <title>Giras — GigSync</title>
    <meta name="description" content="Automatiza la comunicación logística de tu gira. Sin caos." />
    <meta name="application-name" content="GigSync" />
    <meta name="author" content="GigSync" />

    <!-- ── Theme color (chrome/safari top bar) ── -->
    <meta name="theme-color" content="#0c0c0f" />
    <meta name="color-scheme" content="dark" />

    <!-- ── Favicons ── -->
    <!-- SVG: navegadores modernos (Chrome 80+, Firefox, Safari 9+) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- ICO: fallback para navegadores legacy e IE -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <!-- PNG 32×32: Chrome legacy, algunos launchers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <!-- PNG 16×16: sitios donde se muestran íconos pequeños -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- ── Apple / iOS ── -->
    <!-- apple-touch-icon: ícono al añadir a pantalla de inicio en iOS/iPadOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Safari pinned tab (macOS) -->
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#a8d800" />
    <!-- Desactiva detección automática de teléfonos en Safari iOS -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Oculta la barra del navegador al abrir desde pantalla de inicio -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GigSync" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Open Graph (WhatsApp, Slack, Twitter previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Giras — GigSync" />
    <meta property="og:description" content="Automatiza la comunicación logística de tu gira. Sin caos." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ── Fuente ── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
